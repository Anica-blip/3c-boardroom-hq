<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C Boardroom HQ — Enter</title>
    <link rel="icon" type="image/png" href="public/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-image: url('public/boardroom-bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Open Sans', sans-serif;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 10, 40, 0.85);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            text-align: center;
            width: 360px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .crest {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        h1 {
            color: #d8b4fe;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            margin-bottom: 0.3rem;
            text-shadow:
                0 0 12px rgba(192, 132, 252, 0.9),
                0 0 28px rgba(168, 85, 247, 0.6),
                0 0 50px rgba(139, 92, 246, 0.3);
        }

        .subtitle {
            color: rgba(168, 85, 247, 0.8);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: rgba(168, 85, 247, 0.4);
            margin: 0 auto 2rem;
        }

        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: rgba(88, 28, 135, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 8px;
            color: #e2d9f3;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            background: rgba(109, 40, 217, 0.7);
            border-color: rgba(168, 85, 247, 0.8);
            transform: translateY(-1px);
        }

        .btn-login svg {
            width: 20px;
            height: 20px;
            fill: #e2d9f3;
        }

        .tagline {
            margin-top: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            font-style: italic;
            letter-spacing: 0.05em;
        }

        .status-msg {
            margin-top: 1rem;
            color: rgba(168, 85, 247, 0.8);
            font-size: 0.8rem;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="login-card">
        <div class="crest">🌌</div>
        <h1>3C Boardroom HQ</h1>
        <p class="subtitle">Chief Advisor Access</p>
        <div class="divider"></div>

        <button class="btn-login" onclick="handleLogin()">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0
                1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56
                .82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07
                -.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            Enter with GitHub
        </button>

        <p class="status-msg" id="statusMsg"></p>
        <p class="tagline">Think it. Do it. Own it.</p>
    </div>

    <script>
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // If already logged in, redirect to boardroom
        supabaseClient.auth.getUser().then(({ data: { user } }) => {
            if (user) window.location.href = 'index.html';
        });

        async function handleLogin() {
            document.getElementById('statusMsg').textContent = 'Opening secure access...';
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'github',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) {
                document.getElementById('statusMsg').textContent = '❌ ' + error.message;
            }
        }
    </script>
    <div style="position:fixed; bottom:0; width:100%; text-align:right; padding:4px 16px; font-size:0.62rem; opacity:0.4; color:#e2d9f3; letter-spacing:0.02em; pointer-events:none; font-family:'Open Sans',sans-serif;">
        Designed and Built with ❤️ by Claude (Anthropic) × Chef Anica · 3C Thread To Success™ Cooking Lab 🧪👨‍🍳
    </div>

</body>
</html>
